<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><title>Aegis Skydrive</title><link rel="stylesheet" href="styles.css"></head><body>
<canvas id="game"></canvas>
<div id="ui">
  <section id="title" class="scene show"><div class="panel"><h1 class="logo">AEGIS SKYDRIVE</h1><p class="sub">Neon Tactical Airstrike</p><div class="menu-grid"><button class="btn" id="titleStart" data-ui="true">START</button><button class="btn" id="titleTap" data-ui="true">Tap Anywhere</button></div><p class="sub">v0.9</p></div></section>
  <section id="mainMenu" class="scene"><div class="panel"><h2>Main Menu</h2><div class="menu-grid"><button class="btn" id="startMission" data-ui="true">START MISSION</button><button class="btn" id="openHangar" data-ui="true">HANGAR</button><button class="btn" id="openSettings" data-ui="true">SETTINGS</button><button class="btn" id="openHow" data-ui="true">HOW TO PLAY</button><button class="btn" id="openCredits" data-ui="true">CREDITS</button></div></div></section>
  <section id="hangar" class="scene"><div class="panel"><h2>Hangar</h2><div id="shipCards"></div><button class="btn" id="hangarBack" data-ui="true">BACK</button></div></section>
  <section id="settings" class="scene"><div class="panel"><h2>Settings</h2><label>Difficulty <select id="difficulty" data-ui="true"><option>Easy</option><option>Normal</option><option>Hard</option></select></label><br><label>Sensitivity <input id="sens" data-ui="true" type="range" min="1" max="1.25" step="0.01"></label><br><label>Screen Shake <input id="shake" data-ui="true" type="checkbox"></label><br><label>Hit Flash <input id="flash" data-ui="true" type="checkbox"></label><br><label>Show Hitbox <input id="hitbox" data-ui="true" type="checkbox"></label><br><label>Graphics <select id="quality" data-ui="true"><option>Low</option><option>Medium</option><option>High</option></select></label><br><label>Sound <input id="vol" data-ui="true" type="range" min="0" max="1" step="0.05"></label><div class="menu-grid"><button class="btn" id="saveSettings" data-ui="true">SAVE</button><button class="btn" id="resetSave" data-ui="true">RESET SAVE</button><button class="btn" id="settingsBack" data-ui="true">BACK</button></div></div></section>
  <section id="how" class="scene"><div class="panel"><h2>How to Play</h2><p>相対ドラッグ移動 / 自動射撃 / WPN・SKILL・BOMB / 弾幕回避</p><button class="btn" id="howBack" data-ui="true">BACK</button></div></section>
  <section id="credits" class="scene"><div class="panel"><h2>Credits</h2><p>Original HTML5 Canvas STG prototype.</p><button class="btn" id="creditsBack" data-ui="true">BACK</button></div></section>
  <section id="result" class="scene"><div class="panel"><h2 id="resultTitle">RESULT</h2><p id="resultBody"></p><button class="btn" id="resultBack" data-ui="true">RETURN MENU</button></div></section>
  <div id="hud"><div class="top"><div class="chip">SCORE <span id="score">0</span></div><div class="chip">STAGE <span id="stage">1</span></div><div class="chip">SHIP <span id="ship">-</span></div><div class="chip">WPN <span id="wpn">-</span></div><div class="chip">LIFE <span id="life">3</span></div><div class="chip">BOMB <span id="bomb">3</span></div><div class="chip">HP <span id="hp">100</span> SH <span id="sh">60</span> SK <span id="sk">0</span>%</div><button class="btn" id="pauseBtn" data-ui="true" style="pointer-events:auto">PAUSE</button></div><div id="bossBarWrap"><div class="chip">BOSS <span id="bossName"></span></div><div class="bar"><i id="bossBar"></i></div></div><div id="controls"><button class="btn fab" id="wpnBtn" data-ui="true">WPN</button><button class="btn fab" id="skillBtn" data-ui="true">SKILL</button><button class="btn fab" id="bombBtn" data-ui="true">BOMB</button></div></div>
</div><pre id="err"></pre><script src="main.js"></script></body></html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Sky Strike LT2 - Touch Fighter</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin:0; padding:0; background:#020813; height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; touch-action:none; }
    #game { display:block; width:100vw; height:100vh; }
    #hud {
      position:fixed; inset:0; pointer-events:none; color:#dff7ff; text-shadow:0 0 6px #00d1ff;
      padding:calc(env(safe-area-inset-top) + 10px) 10px calc(env(safe-area-inset-bottom) + 8px) 10px;
      display:flex; flex-direction:column; justify-content:space-between;
    }
    #topRow{display:flex; justify-content:space-between; font-weight:700; font-size:14px;}
    #hpBar{height:10px; border:1px solid #8ef; width:140px; background:#123;}
    #hpFill{height:100%; width:100%; background:linear-gradient(90deg,#6f6,#ff5);}    
    #bottomRow{display:flex; justify-content:space-between; align-items:flex-end;}
    .panel{background:rgba(3,15,30,.4); border:1px solid rgba(120,220,255,.5); padding:8px 10px; border-radius:8px;}
    #msg{position:fixed; left:50%; top:48%; transform:translate(-50%,-50%); color:#fff; text-align:center; pointer-events:none; text-shadow:0 0 8px #000;}
    #msg h1{margin:0 0 8px; font-size:32px;}
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="topRow">
      <div class="panel">SCORE <span id="score">0</span></div>
      <div class="panel">WAVE <span id="wave">1</span></div>
      <div class="panel">HP <div id="hpBar"><div id="hpFill"></div></div></div>
    </div>
    <div id="bottomRow">
      <div class="panel">左側: 移動 / 右側: 射撃・ボム</div>
      <div class="panel">BOMB <span id="bomb">3</span></div>
    </div>
  </div>
  <div id="msg"><h1>SKY STRIKE LT2</h1><p>タップでスタート</p></div>
  <script src="main.js"></script>
</body>
</html>
